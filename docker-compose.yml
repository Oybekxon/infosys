version: "3.9"

services:
  # ─── Ma'lumotlar bazasi ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: infosys_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-infosys}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: infosys_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ──────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: infosys_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-admin}:${DB_PASSWORD:-secret123}@postgres:5432/${DB_NAME:-infosys}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-supersecretkey_change_in_production}
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
      - media_data:/app/media
    ports:
      - "8000:8000"

  # ─── Telegram Bot ─────────────────────────────────────
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: infosys_bot
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      API_URL: http://api:8000
      API_SECRET: ${SECRET_KEY:-supersecretkey_change_in_production}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/1
    depends_on:
      - api
      - redis
    volumes:
      - ./bot:/app

  # ─── Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
    container_name: infosys_frontend
    restart: unless-stopped
    depends_on:
      - api

  # ─── Nginx (reverse proxy) ────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: infosys_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - media_data:/var/www/media:ro
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  redis_data:
  media_data:
